name: Test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  # ─── Unit Tests ────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test -v -count=1 ./...

  # ─── E2E Tests ─────────────────────────────────────────────────────────────
  #
  # Uses `spire-server jwt mint` to call the CredentialComposer plugin directly
  # from the server side — no agent or workload registration needed.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      SPIRE_VERSION:  "1.14.4"
      TRUST_DOMAIN:   "example.org"
      WORKLOAD_ID:    "spiffe://example.org/workload/ci"
      CLAIM_NAME:     "uid"
      DOMAIN_CHARS:   "16"
      PATH_CHARS:     "16"
      SERVER_SOCKET:  "/tmp/spire-server/private/api.sock"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Build the plugin binary
      - name: Build plugin
        run: go build -o spire-plugin-alnumid-credential-composer .

      # Download SPIRE server binary only
      - name: Download SPIRE server binary
        run: |
          curl -sSfL \
            "https://github.com/spiffe/spire/releases/download/v${SPIRE_VERSION}/spire-${SPIRE_VERSION}-linux-amd64-musl.tar.gz" \
            | sudo tar -xz --strip-components=2 -C /usr/local/bin \
                "spire-${SPIRE_VERSION}/bin/spire-server"
          spire-server --version

      # Configure and start SPIRE server with the plugin
      - name: Start SPIRE server
        run: |
          mkdir -p /tmp/spire-server

          cat > /tmp/server.conf << EOF
          server {
            bind_address  = "127.0.0.1"
            bind_port     = "8081"
            trust_domain  = "${TRUST_DOMAIN}"
            data_dir      = "/tmp/spire-server"
            log_level     = "DEBUG"
          }
          plugins {
            DataStore "sql" {
              plugin_data {
                database_type     = "sqlite3"
                connection_string = "/tmp/spire-server/datastore.sqlite3"
              }
            }
            KeyManager "memory" { plugin_data {} }
            CredentialComposer "alnumid" {
              plugin_cmd = "$(pwd)/spire-plugin-alnumid-credential-composer"
              plugin_data {
                claim_name   = "${CLAIM_NAME}"
                domain_chars = ${DOMAIN_CHARS}
                path_chars   = ${PATH_CHARS}
              }
            }
          }
          EOF

          spire-server run -config /tmp/server.conf > /tmp/spire-server.log 2>&1 &

          echo "Waiting for SPIRE server..."
          for i in $(seq 1 30); do
            spire-server healthcheck -socketPath "${SERVER_SOCKET}" \
              2>/dev/null && echo "Server ready." && break || sleep 1
          done

      # Mint a JWT-SVID directly via the server admin API and verify the custom claim
      - name: Verify uid claim in JWT-SVID
        run: |
          JWT=$(spire-server jwt mint \
            -socketPath "${SERVER_SOCKET}" \
            -spiffeID   "${WORKLOAD_ID}" \
            -audience   "${TRUST_DOMAIN}" \
            2>&1)
          echo "mint output: ${JWT}"

          # Strip any leading label ("JWT Token:" etc.) — keep only the token
          JWT=$(echo "${JWT}" | grep -oE '[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+')

          if [ -z "${JWT}" ]; then
            echo "=== server log ==="
            cat /tmp/spire-server.log
            echo "FAIL: could not mint JWT-SVID"
            exit 1
          fi

          # Decode JWT payload (base64url, no padding)
          PAYLOAD=$(python3 - "${JWT}" << 'PYEOF'
          import base64, json, sys
          seg = sys.argv[1].split('.')[1]
          seg += '=' * (-len(seg) % 4)
          print(json.dumps(json.loads(base64.urlsafe_b64decode(seg)), indent=2))
          PYEOF
          )

          echo "JWT payload:"
          echo "${PAYLOAD}"

          # Extract the custom claim
          CLAIM_VAL=$(echo "${PAYLOAD}" | python3 -c \
            "import sys, json; d = json.load(sys.stdin); print(d.get('${CLAIM_NAME}', 'MISSING'))")

          EXPECTED_LEN=$(( DOMAIN_CHARS + PATH_CHARS ))
          ACTUAL_LEN=${#CLAIM_VAL}

          echo "Claim '${CLAIM_NAME}': ${CLAIM_VAL}"
          echo "Expected: ${EXPECTED_LEN} hex chars / Actual: ${ACTUAL_LEN} chars"

          # Verify length
          if [ "${ACTUAL_LEN}" -ne "${EXPECTED_LEN}" ]; then
            echo "FAIL: expected ${EXPECTED_LEN} chars, got ${ACTUAL_LEN}"
            exit 1
          fi

          # Verify hex characters only
          if ! echo "${CLAIM_VAL}" | grep -qE '^[0-9a-f]+$'; then
            echo "FAIL: value contains non-hex characters"
            exit 1
          fi

          echo "PASS: claim '${CLAIM_NAME}' = ${CLAIM_VAL}"
